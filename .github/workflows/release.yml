name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          BINARY_NAME="vern-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "$BINARY_NAME" cmd/vern/main.go
          sha256sum "$BINARY_NAME" > "$BINARY_NAME.sha256"
        env:
          CGO_ENABLED: 0
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vern-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
            vern-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
