name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o vern-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }} cmd/vern/main.go
        env:
          CGO_ENABLED: 0
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: vern-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-manifest:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update manifest
        run: |
          cat > languages/manifest.json <<EOF
          {
            "latest_langs_version": "1.0.0",
            "langs_url": "https://raw.githubusercontent.com/chris-roerig/vern/main/languages/v1.0.0.yaml"
          }
          EOF

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Update manifest for ${{ steps.version.outputs.VERSION }}"
          file_pattern: languages/manifest.json
