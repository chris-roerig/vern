languages:
  - name: go
    binary_name: go
    version_source:
      url: "https://go.dev/dl/"
      version_regex: "go(\\d+\\.\\d+\\.\\d+)\\.linux-amd64\\.tar\\.gz"
    install:
      download_template: "https://go.dev/dl/go{{.Version}}.{{.OS}}-{{.Arch}}.tar.gz"
      extract_type: "tar.gz"
      bin_rel_path: "bin/go"

  - name: python
    binary_name: python3
    version_source:
      url: "https://www.python.org/ftp/python/"
      version_regex: "(\\d+\\.\\d+\\.\\d+)/"
    install:
      download_template: "https://www.python.org/ftp/python/{{.Version}}/Python-{{.Version}}.tgz"
      extract_type: "tar.gz"
      bin_rel_path: "bin/python3"
      build_config: "./configure --prefix={{.InstallDir}} $(uname -s | grep -q Darwin && echo \"--build=$(uname -m | sed 's/arm64/aarch64/')-apple-darwin\")"
      build_command: "make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc) && make install"

  - name: node
    binary_name: node
    version_source:
      url: "https://nodejs.org/dist/"
      version_regex: "v(\\d+\\.\\d+\\.\\d+)/"
    install:
      download_template: "https://nodejs.org/dist/v{{.Version}}/node-v{{.Version}}-{{.OS}}-{{.ArchAlt}}.tar.xz"
      extract_type: "tar.xz"
      bin_rel_path: "bin/node"

  - name: ruby
    binary_name: ruby
    version_source:
      url: "https://www.ruby-lang.org/en/downloads/releases/"
      version_regex: "Ruby (\\d+\\.\\d+\\.\\d+)"
    install:
      download_template: "https://cache.ruby-lang.org/pub/ruby/{{.MajorMinor}}/ruby-{{.Version}}.tar.gz"
      extract_type: "tar.gz"
      bin_rel_path: "bin/ruby"
      build_config: "./configure --prefix={{.InstallDir}} $(uname -s | grep -q Darwin && echo \"--build=$(uname -m | sed 's/arm64/aarch64/')-apple-darwin\")"
      build_command: "make -j$(sysctl -n hw.ncpu 2>/dev/null || nproc) && make install"
    requires:
      binary: ruby
      min_version: "3.1.0"
      bootstrap_version: "3.4"
      when_major_gte: 4

  - name: rust
    binary_name: rustc
    version_source:
      url: "https://github.com/rust-lang/rust/tags"
      version_regex: "/releases/tag/(\\d+\\.\\d+\\.\\d+)"
    install:
      download_template: "https://static.rust-lang.org/dist/rust-{{.Version}}-{{.RustTarget}}.tar.xz"
      extract_type: "tar.xz"
      bin_rel_path: "bin/rustc"
      build_config: "./install.sh --prefix={{.InstallDir}}"

  - name: zig
    binary_name: zig
    version_source:
      url: "https://ziglang.org/download/"
      version_regex: "zig-linux-x86_64-(\\d+\\.\\d+\\.\\d+)\\.tar\\.xz"
    install:
      download_template: "https://ziglang.org/download/{{.Version}}/zig-{{.OSAlt}}-{{.ArchGNU}}-{{.Version}}.tar.xz"
      extract_type: "tar.xz"
      bin_rel_path: "zig"
